<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Active Buffer / Feeder Motion Simulator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Notching Active Buffer 동기 시뮬레이터</h1>
    <p>Unwinder(정속) - Feeder(7:3 단속) - Active Buffer(차이 보정) 모션 및 그래프</p>
  </header>

  <main>
    <section class="panel controls">
      <h2>설정</h2>
      <div class="grid">
        <label>Unwinder 속도 (deg/s)
          <input id="unwinderDeg" type="range" min="20" max="720" step="1" value="180" />
          <span id="unwinderDegVal"></span>
        </label>
        <label>사이클 이송량 (mm)
          <input id="feedLength" type="range" min="40" max="400" step="5" value="160" />
          <span id="feedLengthVal"></span>
        </label>
        <label>Feeder 가속 시간 (s)
          <input id="accTime" type="range" min="0.05" max="1.5" step="0.01" value="0.25" />
          <span id="accTimeVal"></span>
        </label>
        <label>Feeder 감속 시간 (s)
          <input id="decTime" type="range" min="0.05" max="1.5" step="0.01" value="0.25" />
          <span id="decTimeVal"></span>
        </label>
        <label>Feeder 최대 속도 목표 (mm/s)
          <input id="feederVmax" type="range" min="50" max="2000" step="10" value="550" />
          <span id="feederVmaxVal"></span>
        </label>
      </div>

      <h3>롤러 직경 (mm)</h3>
      <div class="grid roller-grid">
        <label>Roller1 <input id="dR1" type="range" min="40" max="220" value="120" /><span id="dR1Val"></span></label>
        <label>Roller2 <input id="dR2" type="range" min="40" max="220" value="120" /><span id="dR2Val"></span></label>
        <label>Roller3 <input id="dR3" type="range" min="40" max="220" value="120" /><span id="dR3Val"></span></label>
        <label>Unwinder <input id="dUnw" type="range" min="60" max="260" value="160" /><span id="dUnwVal"></span></label>
        <label>Feeder <input id="dFeed" type="range" min="60" max="260" value="150" /><span id="dFeedVal"></span></label>
        <label>Active Buffer <input id="dBuf" type="range" min="60" max="260" value="170" /><span id="dBufVal"></span></label>
      </div>


      <h3>롤러 진입 방향(선택)</h3>
      <div class="grid roller-grid">
        <label>Roller1 Entry
          <select id="entryR1">
            <option value="auto">auto</option><option value="left">left</option><option value="top">top</option><option value="right">right</option><option value="bottom">bottom</option>
            <option value="leftTop">leftTop</option><option value="rightTop">rightTop</option><option value="rightBottom">rightBottom</option><option value="leftBottom">leftBottom</option>
          </select>
        </label>
        <label>Roller2 Entry
          <select id="entryR2">
            <option value="auto">auto</option><option value="left">left</option><option value="top" selected>top</option><option value="right">right</option><option value="bottom">bottom</option>
            <option value="leftTop">leftTop</option><option value="rightTop">rightTop</option><option value="rightBottom">rightBottom</option><option value="leftBottom">leftBottom</option>
          </select>
        </label>
        <label>ActiveBuffer Entry
          <select id="entryBuf">
            <option value="auto">auto</option><option value="left" selected>left</option><option value="top">top</option><option value="right">right</option><option value="bottom">bottom</option>
            <option value="leftTop">leftTop</option><option value="rightTop">rightTop</option><option value="rightBottom">rightBottom</option><option value="leftBottom">leftBottom</option>
          </select>
        </label>
        <label>Roller3 Entry
          <select id="entryR3">
            <option value="auto">auto</option><option value="left" selected>left</option><option value="top">top</option><option value="right">right</option><option value="bottom">bottom</option>
            <option value="leftTop">leftTop</option><option value="rightTop">rightTop</option><option value="rightBottom">rightBottom</option><option value="leftBottom">leftBottom</option>
          </select>
        </label>
        <label>Feeder Entry
          <select id="entryFeed">
            <option value="auto">auto</option><option value="left">left</option><option value="top">top</option><option value="right">right</option><option value="bottom">bottom</option>
            <option value="leftTop">leftTop</option><option value="rightTop">rightTop</option><option value="rightBottom">rightBottom</option><option value="leftBottom" selected>leftBottom</option>
          </select>
        </label>
      </div>

      <div class="buttons">
        <button id="startBtn">Start</button>
        <button id="resetBtn">Reset</button>
      </div>

      <div id="derived" class="derived"></div>
    </section>

    <section class="panel layout">
      <h2>기구 모션</h2>
      <canvas id="machineCanvas" width="1180" height="500"></canvas>
      <p class="legend"><span class="line-web"></span> 빨간선: 극판(웹) 경로</p>
    </section>

    <section class="panel charts">
      <h2>모터 모션 그래프</h2>
      <div class="chart-grid">
        <canvas id="velChart" width="900" height="180"></canvas>
        <canvas id="accChart" width="900" height="180"></canvas>
        <canvas id="posChart" width="900" height="180"></canvas>
      </div>
      <p class="small">Pos 그래프는 Active Buffer 모터만 표시합니다.</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
